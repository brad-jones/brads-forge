[workspace]
channels = ["https://repo.prefix.dev/brads-forge", "conda-forge"]
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64"]

[tasks]
init = "task init"

[tasks.code]
depends-on = ["init"]
cmd = "code ."

[tasks.zed]
depends-on = ["init"]
cmd = "zed ."

[target.unix.activation.env]
PATH = "$PWD/scripts:$PATH"

[dependencies]
deno = ">=2.9.0,<2.10"
rattler-build = ">=0.67.0,<0.68"
lefthook = ">=2.1.9,<3"
xcaffold = ">=0.15.0,<0.16"
cocogitto = ">=7.0.0,<8"
task = ">=3.51.1,<4"
dprint = ">=0.54.0,<0.56"
