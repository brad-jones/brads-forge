on:
  push:
    branches:
      - master
  schedule:
    - cron: 28 3 * * *
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: ⬇️ Git Checkout
        uses: actions/checkout@v7

      - name: ⚙️ Install pixi env
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.71.1
          activate-environment: true

      - name: 🧹 Cleanup old versions
        run: task prefix-clean -- --older-than-days 365 --yes

  build:
    needs: clean
    name: ${{ join(matrix.targets) }}
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { targets: [linux-32, linux-64, linux-aarch64], os: ubuntu-latest }
          - { targets: [win-32, win-64, win-arm64], os: windows-latest }
          - { targets: [osx-64], os: macos-15-intel }
          - { targets: [osx-arm64], os: macos-latest }
    steps:
      - name: ⬇️ Git Checkout
        uses: actions/checkout@v7

      - name: ⚙️ Install pixi env
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.71.1
          activate-environment: true

      - name: 🧑‍🍳 Build & Publish Recipes
        run: task build -- --target-platforms ${{ join(matrix.targets, ' ') }}
